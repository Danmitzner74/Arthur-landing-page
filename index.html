<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arthur — AI Companion for Independent Aging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script async src="https://tally.so/widgets/embed.js"></script>
<style>
:root {
  --sky:       #1A6FAE;
  --sky-dark:  #0F4F80;
  --sky-mid:   #2B85C8;
  --sky-light: #EEF5FC;
  --sky-pale:  #F5F9FE;
  --amber:     #E08B28;
  --amber-lt:  #F5B24A;
  --white:     #FFFFFF;
  --navy:      #0D2340;
  --navy-mid:  #1A3A5C;
  --muted:     #5A7A94;
  --border:    rgba(13,35,64,0.1);
  --border-lt: rgba(13,35,64,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--white);
  color: var(--navy);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 { font-family: 'Playfair Display', Georgia, serif; font-weight: 400; line-height: 1.1; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 52px;
  transition: background 0.35s, backdrop-filter 0.35s, box-shadow 0.35s;
}
nav.scrolled {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  box-shadow: 0 1px 0 var(--border);
}
.nav-logo {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 22px; color: var(--white);
  letter-spacing: -0.02em; text-decoration: none; transition: color 0.35s;
}
.nav-logo span { color: var(--amber-lt); transition: color 0.35s; }
.nav-actions { display: flex; gap: 10px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 22px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none; transition: all 0.2s;
  white-space: nowrap; border: 1.5px solid transparent;
}
.btn-white-outline { background: transparent; border-color: rgba(255,255,255,0.35); color: var(--white); }
.btn-white-outline:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.09); }
.btn-white-solid { background: var(--white); border-color: var(--white); color: var(--sky-dark); }
.btn-white-solid:hover { background: #EEF5FC; }
.btn-sky { background: var(--sky); border-color: var(--sky); color: var(--white); }
.btn-sky:hover { background: var(--sky-dark); border-color: var(--sky-dark); }
.btn-outline-sky { background: transparent; border-color: var(--sky); color: var(--sky); }
.btn-outline-sky:hover { background: var(--sky-light); }

/* ── HERO ── */
.hero {
  min-height: 100vh; background: var(--sky);
  display: flex; flex-direction: column; justify-content: center;
  padding: 148px 52px 96px; position: relative; overflow: hidden;
  gap: 0;
}
.hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 55% at -5% 105%, rgba(15,79,128,0.55) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 105% 10%, rgba(43,133,200,0.4) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 50% 50%, rgba(26,111,174,0.2) 0%, transparent 70%);
}
.hero::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
  background: linear-gradient(to bottom, transparent, rgba(15,79,128,0.18));
  pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 6px 14px; margin-bottom: 44px; width: fit-content;
  background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.28);
  border-radius: 100px; color: rgba(255,255,255,0.85);
  font-size: 13px; font-weight: 400; letter-spacing: 0.02em;
}
.hero-eyebrow::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--amber-lt);
  animation: dot-pulse 2.4s ease-in-out infinite;
}
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.hero h1 {
  font-size: clamp(28px, 2.8vw, 46px); color: var(--white); max-width: 580px;
  letter-spacing: -0.02em; line-height: 1.12; margin-bottom: 10px; position: relative; z-index: 1;
}
.hero h1 em { font-style: italic; color: rgba(255,255,255,0.6); }
.hero-tagline-wrap {
  margin-top: 22px; margin-bottom: 14px;
  display: flex; align-items: center; position: relative; z-index: 1;
}
.hero-layout {
  display: flex; align-items: center; justify-content: space-between;
  gap: 48px; position: relative; z-index: 1; flex: 1;
}
.hero-copy { flex: 1; min-width: 0; max-width: 600px; }
.hero-bubble-col {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
  padding-right: 24px; gap: 16px;
}
.hero-ai-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 100px;
  background: rgba(255,255,255,0.11); border: 1px solid rgba(255,255,255,0.22);
  backdrop-filter: blur(8px);
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.75);
  letter-spacing: 0.06em; text-transform: uppercase;
  align-self: flex-start; margin-left: 12px;
  animation: bubble-drift 6s ease-in-out infinite;
  animation-delay: 0.8s;
}
.hero-ai-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--amber-lt);
  animation: dot-pulse 2.4s ease-in-out infinite;
}
.hero-tagline-bubble {
  display: inline-flex; align-items: center; gap: 16px;
  padding: 20px 28px; border-radius: 20px 20px 20px 6px;
  background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.26);
  backdrop-filter: blur(8px); white-space: nowrap;
  animation: bubble-drift 6s ease-in-out infinite;
}
@keyframes bubble-drift {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}
.arthur-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--amber); display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', Georgia, serif; font-size: 20px; color: white; flex-shrink: 0;
}
.hero-tagline-bubble span {
  font-size: 18px; color: rgba(255,255,255,0.88);
  font-style: italic; font-family: 'Playfair Display', Georgia, serif;
  white-space: nowrap;
}
.typing-cursor {
  display: inline-block; width: 2px; height: 16px;
  background: rgba(255,255,255,0.6); margin-left: 2px; vertical-align: middle;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.hero-sub {
  font-size: clamp(16px, 1.7vw, 18px); color: rgba(255,255,255,0.62); max-width: 520px;
  line-height: 1.7; margin-top: 16px; margin-bottom: 40px;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-stats {
  margin-top: 80px; padding-top: 36px;
  border-top: 1px solid rgba(255,255,255,0.14);
  display: flex; gap: 52px; flex-wrap: wrap;
  justify-content: center;
  position: relative; z-index: 1;
}
.hero-stat-num {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 36px; color: var(--white); letter-spacing: -0.02em; line-height: 1;
}
.hero-stat-desc { font-size: 13px; color: rgba(255,255,255,0.45); max-width: 150px; line-height: 1.45; margin-top: 5px; }

/* ── SHARED SECTION STYLES ── */
section { padding: 96px 52px; }
.section-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.11em;
  text-transform: uppercase; color: var(--sky); margin-bottom: 18px;
}
section h2 { font-size: clamp(34px, 4.2vw, 52px); line-height: 1.1; max-width: 680px; margin-bottom: 22px; }
.section-intro { font-size: 17px; color: var(--muted); max-width: 560px; line-height: 1.8; }

/* ── DEMO SECTION ── */
.demo-section {
  background: var(--sky-dark); padding: 96px 52px;
  position: relative; overflow: hidden;
}
.demo-section::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 95% 50%, rgba(43,133,200,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 5% 80%, rgba(15,79,128,0.4) 0%, transparent 55%);
}
.demo-section .section-label { color: var(--amber-lt); position: relative; z-index: 1; }
.demo-section h2 { color: var(--white); position: relative; z-index: 1; }
.demo-section .section-intro { color: rgba(255,255,255,0.5); position: relative; z-index: 1; }

/* scenario picker cards */
.scenario-picker {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-top: 48px; position: relative; z-index: 1;
}
.scenario-card {
  background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 24px; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  user-select: none;
}
.scenario-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.22); transform: translateY(-2px); }
.scenario-card.active {
  background: rgba(245,178,74,0.12); border-color: rgba(245,178,74,0.45);
}
.scenario-icon {
  font-size: 26px; margin-bottom: 14px; display: block; line-height: 1;
}
.scenario-card h3 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 17px; font-weight: 400; color: var(--white);
  margin-bottom: 6px; line-height: 1.25;
}
.scenario-card p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.5; }
.scenario-card.active h3 { color: var(--amber-lt); }
.scenario-card.active p { color: rgba(245,178,74,0.6); }

/* demo window */
.demo-window {
  margin-top: 24px; position: relative; z-index: 1;
  background: rgba(5,28,52,0.7); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; overflow: hidden;
  backdrop-filter: blur(10px);
  transition: opacity 0.3s;
}
.demo-window-header {
  padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
}
.demo-window-title {
  display: flex; align-items: center; gap: 10px;
}
.demo-avatar-sm {
  width: 26px; height: 26px; border-radius: 50%; background: var(--amber);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', Georgia, serif; font-size: 11px; color: white; flex-shrink: 0;
}
.demo-scenario-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); }
.demo-step-count { font-size: 12px; color: rgba(255,255,255,0.3); }

/* messages */
.demo-messages {
  padding: 24px; height: 320px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.demo-messages::-webkit-scrollbar { width: 4px; }
.demo-messages::-webkit-scrollbar-track { background: transparent; }
.demo-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

/* empty state */
.demo-empty {
  height: 320px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: rgba(255,255,255,0.2); text-align: center; padding: 24px;
}
.demo-empty-icon { font-size: 32px; opacity: 0.4; }
.demo-empty p { font-size: 14px; line-height: 1.6; }

/* message bubbles */
.msg {
  display: flex; flex-direction: column; gap: 3px;
  animation: msg-in 0.35s ease forwards;
  opacity: 0; transform: translateY(8px);
}
@keyframes msg-in { to { opacity:1; transform: translateY(0); } }

.msg-bubble {
  padding: 11px 15px; border-radius: 14px;
  font-size: 14px; line-height: 1.55; max-width: 82%;
}
.msg.user { align-items: flex-end; }
.msg.user .msg-bubble {
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75);
  border-radius: 14px 14px 4px 14px;
}
.msg.arthur { align-items: flex-start; }
.msg.arthur .msg-bubble {
  background: rgba(245,178,74,0.13); border: 1px solid rgba(245,178,74,0.25);
  color: rgba(255,255,255,0.88); border-radius: 14px 14px 14px 4px;
}
.msg-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.28); padding: 0 4px;
}
.msg.arthur .msg-label { color: rgba(245,178,74,0.55); }

/* typing indicator */
.typing-indicator {
  display: none; align-items: center; gap: 5px; padding: 12px 16px;
  background: rgba(245,178,74,0.1); border: 1px solid rgba(245,178,74,0.18);
  border-radius: 14px 14px 14px 4px; width: fit-content;
}
.typing-indicator.visible { display: flex; }
.typing-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(245,178,74,0.6);
  animation: typing-bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* demo footer / controls */
.demo-footer {
  padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.demo-progress { display: flex; gap: 5px; align-items: center; }
.progress-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.2); transition: background 0.2s, transform 0.2s;
}
.progress-dot.done { background: rgba(255,255,255,0.45); }
.progress-dot.current { background: var(--amber-lt); transform: scale(1.3); }
.demo-controls { display: flex; align-items: center; gap: 10px; }
.demo-hint { font-size: 12px; color: rgba(255,255,255,0.25); }

.btn-demo-next {
  background: var(--amber); border: none; color: white;
  padding: 9px 20px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.2s, opacity 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.btn-demo-next:hover { background: #C97820; }
.btn-demo-next:disabled { opacity: 0.45; cursor: default; }
.btn-demo-next.hidden { display: none; }

.btn-demo-reset {
  background: transparent; border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.55);
  padding: 9px 20px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  display: none; align-items: center; gap: 6px;
}
.btn-demo-reset:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.8); }
.btn-demo-reset.visible { display: flex; }

/* ── ORIGIN ── */
.origin-section { background: var(--white); padding-top: 84px; padding-bottom: 84px; }
.origin-quote {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(20px, 2.4vw, 27px); font-style: italic;
  line-height: 1.6; color: var(--navy); max-width: 640px;
  padding-left: 28px; border-left: 3px solid var(--amber);
  margin: 40px 0 16px;
}
.origin-attr { font-size: 14px; color: var(--muted); padding-left: 28px; }
.origin-body {
  margin-top: 28px; font-size: 17px; color: var(--muted);
  max-width: 540px; line-height: 1.75; padding-left: 28px;
}

/* ── INSIGHT ── */
.insight-section { background: var(--sky-light); }
.insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; margin-top: 60px; }
.insight-text p { font-size: 17px; color: var(--muted); line-height: 1.75; margin-bottom: 20px; }
.insight-text strong { color: var(--navy); font-weight: 500; }
.convo-card {
  background: var(--sky-dark); border-radius: 20px; padding: 36px;
  position: relative; overflow: hidden;
}
.convo-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 60% 0%, rgba(43,133,200,0.35) 0%, transparent 60%);
  pointer-events: none;
}
.convo-panel { position: relative; z-index: 1; }
.convo-tag {
  font-size: 11px; font-weight: 500; letter-spacing: 0.09em;
  text-transform: uppercase; margin-bottom: 14px; display: block;
}
.convo-tag.before { color: rgba(255,255,255,0.3); }
.convo-tag.after { color: var(--amber-lt); }
.convo-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 22px 0; }
.bubbles { display: flex; flex-direction: column; gap: 9px; }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 92%; }
.b-user {
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65);
  align-self: flex-end; border-radius: 12px 12px 4px 12px;
}
.b-plain {
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35);
  align-self: flex-start; border-radius: 12px 12px 12px 4px;
}
.b-arthur {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(245,178,74,0.35);
  color: rgba(255,255,255,0.88); align-self: flex-start; border-radius: 12px 12px 12px 4px;
}
.b-arthur-name { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.b-arthur-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--amber); display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', Georgia, serif; font-size: 10px; color: white;
}
.b-arthur-label { font-size: 11px; color: var(--amber-lt); font-weight: 500; letter-spacing: 0.06em; }
.b-dead-end { font-size: 12px; font-style: italic; opacity: 0.38; padding: 0 2px; align-self: flex-start; }

/* ── FEATURES ── */
.features-section { background: var(--white); }
.features-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; margin-top: 56px;
  background: var(--border-lt); border: 1px solid var(--border-lt); border-radius: 18px; overflow: hidden;
}
.feature-card { background: var(--white); padding: 32px 30px; transition: background 0.2s; }
.feature-card:hover { background: var(--sky-pale); }
.feat-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--sky-light); display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 18px;
}
.feature-card h3 { font-size: 18px; margin-bottom: 9px; color: var(--navy); }
.feature-card p { font-size: 14px; color: var(--muted); line-height: 1.65; }

/* ── CAREGIVER DASHBOARD ── */
.dashboard-section { background: var(--sky-dark); }
.dashboard-section .section-label { color: var(--amber-lt); }
.dashboard-section h2 { color: var(--white); }
.dashboard-section .section-intro { color: rgba(255,255,255,0.55); }
.dashboard-layout {
  display: grid; grid-template-columns: 1fr 420px;
  gap: 64px; align-items: center; margin-top: 60px;
}
.dashboard-img-wrap {
  position: relative; border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 32px 80px rgba(0,0,0,0.35);
}
.dashboard-img { display: block; width: 100%; height: auto; border-radius: 16px; }
.dashboard-features { display: flex; flex-direction: column; gap: 36px; }
.dash-feat { display: flex; gap: 18px; align-items: flex-start; }
.dash-feat-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--amber-lt);
}
.dash-feat h3 {
  font-family: 'Playfair Display', Georgia, serif; font-size: 17px;
  font-weight: 400; color: var(--white); margin-bottom: 7px;
}
.dash-feat p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.7; }

/* ── MARKET ── */
.market-section { background: var(--sky-light); }
.comparison-wrap { margin-top: 56px; overflow-x: auto; border-radius: 16px; }
.comparison-table {
  width: 100%; border-collapse: collapse;
  border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
}
.comparison-table thead th {
  background: var(--sky-dark); color: rgba(255,255,255,0.5);
  padding: 16px 22px; font-weight: 400; font-size: 13px;
  text-align: left; letter-spacing: 0.04em; border-bottom: 1px solid rgba(255,255,255,0.07);
}
.comparison-table thead th.col-arthur { color: var(--amber-lt); font-weight: 500; }
.comparison-table td {
  padding: 15px 22px; font-size: 14px; color: var(--muted);
  border-bottom: 1px solid var(--border); background: var(--white);
}
.comparison-table tr:last-child td { border-bottom: none; }
.comparison-table tr:nth-child(even) td { background: var(--sky-pale); }
.comparison-table td.col-arthur { background: rgba(26,111,174,0.05); color: var(--sky); font-weight: 500; }
.comparison-table tr:nth-child(even) td.col-arthur { background: rgba(26,111,174,0.09); }
.comparison-table td.row-label { color: var(--navy); font-weight: 500; font-size: 14px; background: var(--white); }
.comparison-table tr:nth-child(even) td.row-label { background: var(--sky-pale); }
.ok { color: #1E7A4A; font-weight: 500; }
.no { color: #B04040; }
.market-callout {
  margin-top: 36px; padding: 24px 30px;
  background: var(--sky); border-radius: 14px;
  color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.75;
}
.market-callout strong { color: var(--white); font-weight: 500; }

/* ── CTA ── */
.cta-section { background: var(--sky-pale); text-align: center; padding: 100px 52px; }
.cta-section h2 { margin: 0 auto 20px; text-align: center; max-width: 580px; }
.cta-section .section-intro { margin: 0 auto 44px; text-align: center; }
.cta-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto 14px; }
.cta-form input {
  flex: 1; padding: 12px 18px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 15px;
  background: var(--white); color: var(--navy); outline: none;
  transition: border-color 0.2s; box-shadow: 0 1px 3px rgba(13,35,64,0.06);
}
.cta-form input:focus { border-color: var(--sky); }
.cta-form input::placeholder { color: #9DB5C8; }
.cta-thanks { display: none; font-size: 15px; font-weight: 500; color: #1E7A4A; margin-bottom: 14px; }
.cta-sep { font-size: 14px; color: #9DB5C8; margin: 24px 0; letter-spacing: 0.04em; }
.cta-direct { font-size: 15px; color: var(--muted); }
.cta-direct a { color: var(--sky); text-decoration: none; font-weight: 500; }
.cta-direct a:hover { text-decoration: underline; }

/* ── FOOTER ── */
footer {
  background: var(--sky-dark); color: rgba(255,255,255,0.38);
  padding: 36px 52px; display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; gap: 20px; flex-wrap: wrap;
}
.footer-logo { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: rgba(255,255,255,0.65); }

/* ── SCROLL ANIMATIONS ── */
.fade-up { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-up.in { opacity: 1; transform: translateY(0); }
.fade-up[data-delay="1"] { transition-delay: 0.1s; }
.fade-up[data-delay="2"] { transition-delay: 0.2s; }
.fade-up[data-delay="3"] { transition-delay: 0.3s; }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
  nav { padding: 16px 24px; }
  section, .hero, .demo-section { padding-left: 24px; padding-right: 24px; }
  .insight-grid { grid-template-columns: 1fr; }
  .features-grid { grid-template-columns: 1fr 1fr; }
  .dashboard-layout { grid-template-columns: 1fr; gap: 40px; }
  .hero-stats { gap: 30px; }
  footer { flex-direction: column; text-align: center; }
  .scenario-picker { grid-template-columns: 1fr; gap: 8px; }
  .hero-layout { flex-direction: column; gap: 32px; }
  .hero-bubble-col { display: none; }
}
@media (max-width: 560px) {
  .features-grid { grid-template-columns: 1fr; }
  .cta-form { flex-direction: column; }
  footer { padding: 28px 24px; }
  .scenario-picker { grid-template-columns: 1fr; }
  .demo-messages { height: 260px; }
}
